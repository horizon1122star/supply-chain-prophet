services:
  - type: web
    name: supply-chain-prophet-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Add the necessary environment variables here, or configure them securely in the Render dashboard later
      - key: PYTHON_VERSION
        value: 3.11.0
